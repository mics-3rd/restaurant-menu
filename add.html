<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>メニュー追加</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>
<header>
  <h1>メニュー追加</h1>
</header>
<main>
  <section class="box">
    <form id="addForm">
      <div>
        <label>カテゴリ</label>
        <select id="category" required></select>
      </div>
      <div><label>メニュー名</label><input id="name" type="text" required></div>
      <div><label>説明</label><textarea id="description" rows="2"></textarea></div>
      <div><label>分量</label><input id="serving" type="text"></div>
      <div><label>材料（改行区切り）</label><textarea id="ingredients" rows="4"></textarea></div>
      <div><label>作り方（改行区切り）</label><textarea id="recipe" rows="5"></textarea></div>
      <button type="submit" class="back-btn">追加</button>
      <button type="button" id="cancel" class="back-btn">キャンセル</button>
    </form>
    <p id="statusMessage" style="margin:0.8rem 0; color:#4a2f1f;"></p>
  </section>
</main>
<footer class="footer">
  <small>© 2026 料理メニューサイト</small>
</footer>

<script>
async function init() {
  const select = document.getElementById("category");
  select.innerHTML = "";
  try {
    const resp = await fetch("data/menus.json");
    if (!resp.ok) throw new Error("ファイル読み込み失敗");
    const data = await resp.json();
    const categories = Array.isArray(data.categories) ? data.categories : [];
    if (categories.length === 0) {
      select.innerHTML = `<option value="">カテゴリがありません</option>`;
      return;
    }
    categories.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.name;
      select.appendChild(opt);
    });
  } catch (err) {
    select.innerHTML = `<option value="">読み込みエラー</option>`;
    console.error("カテゴリ読み込み失敗", err);
  }
}

document.getElementById("addForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const status = document.getElementById("statusMessage");
  status.style.color = "#4a2f1f";
  status.textContent = "送信中...";

  const payload = {
    id: `custom-${Date.now()}`,
    category: document.getElementById("category").value,
    name: document.getElementById("name").value.trim(),
    description: document.getElementById("description").value.trim(),
    serving: document.getElementById("serving").value.trim(),
    ingredients: document.getElementById("ingredients").value.split("\n").map(s => s.trim()).filter(Boolean),
    recipe: document.getElementById("recipe").value.split("\n").map(s => s.trim()).filter(Boolean)
  };

  try {
    const resp = await fetch(DATA_API_URL, {
      method: "POST",
      mode: "cors",
      body: JSON.stringify(payload)
    });

    if (!resp.ok) throw new Error(resp.status + " " + resp.statusText);

    const json = await resp.json();
    if (json.ok) {
      status.style.color = "#2f5d2f";
      status.textContent = "追加が完了しました。";
      setTimeout(() => location.href = `category.html?cat=${encodeURIComponent(payload.category)}`, 800);
    } else {
      status.style.color = "#8b2b2b";
      status.textContent = "追加に失敗しました： " + (json.message || "サーバエラー");
    }
  } catch (err) {
    status.style.color = "#8b2b2b";
    status.textContent = "追加に失敗しました： " + err.message;
    console.error(err);
  }
});

document.getElementById("cancel").addEventListener("click", ()=>location.href="index.html");
init().catch(console.error);
</script>
</body>
</html>
