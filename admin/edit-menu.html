<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>メニュー編集</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <header>メニュー編集</header>
    <div class="container">
        <select id="menu"></select>
        <input id="name" placeholder="メニュー名">
        <textarea id="description" placeholder="説明"></textarea>
        <select id="category"></select>
        <input id="servings" placeholder="何人分">
        <textarea id="ingredients" placeholder="材料 (1行1つ)"></textarea>
        <textarea id="steps" placeholder="作り方 (1行1つ)"></textarea>
        <button onclick="updateMenu()">更新</button>
    </div>
    <script src="../config.js"></script>
    <script src="js/edit-menu.js"></script>
</body>

</html>
