<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>料理メニュー - 一覧</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>
<header>
  <h1 id="heading">メニュー</h1>
</header>
<main>
  <button id="backBtn" class="back-btn" type="button">戻る</button>
  <ul id="menuList" class="menu-list"></ul>
</main>
<footer class="footer">
  <small>© みっくん食堂</small>
</footer>

<script>
function getQuery(name) {
  return new URLSearchParams(location.search).get(name);
}

async function loadMenu() {
  const catId = getQuery("cat");
  const json = await fetch("data/menus.json").then(r => r.json());
  const cat = (json.categories || []).find(c => c.id === catId);
  const heading = document.getElementById("heading");
  const list = document.getElementById("menuList");

  if (!cat) {
    heading.textContent = "不明なカテゴリ";
    list.innerHTML = '<li class="empty">カテゴリが見つかりません。</li>';
    return;
  }
  heading.textContent = `${cat.name} のメニュー`;

  const items = (json.menus || []).filter(m => m.category === catId);
  if (!items.length) {
    list.innerHTML = '<li class="empty">メニューがありません。</li>';
    return;
  }

  list.innerHTML = "";
  items.forEach(item => {
    const li = document.createElement("li");
    li.className = "menu-card";

    const title = document.createElement("div");
    title.className = "menu-card-title";
    title.textContent = item.name;

    const desc = document.createElement("div");
    desc.className = "menu-card-description";
    desc.textContent = item.description || "説明なし";

    li.appendChild(title);
    li.appendChild(desc);
    li.addEventListener("click", () => {
      location.href = `recipe.html?menu=${encodeURIComponent(item.id)}&cat=${encodeURIComponent(catId)}`;
    });
    list.appendChild(li);
  });
}

document.getElementById("backBtn").addEventListener("click", () => location.href = "index.html");
loadMenu().catch(err => {
  console.error(err);
  document.getElementById("menuList").innerHTML = '<li class="empty">読み込み失敗</li>';
});
</script>
</body>
</html>
