<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>料理メニュー - 一覧</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>
<header>
  <h1 id="heading">メニュー</h1>
</header>
<main>
  <button id="backBtn" class="back-btn" type="button">戻る</button>
  <ul id="menuList" class="menu-list"></ul>
</main>
<footer class="footer">
  <small>© 2026 料理メニューサイト</small>
</footer>

<script>
function getQuery(name) {
  return new URLSearchParams(location.search).get(name);
}

async function fetchMenus() {
  try {
    const r = await fetch(DATA_API_URL, { mode:"cors" });
    if (!r.ok) throw new Error("APIエラー " + r.status);
    const j = await r.json();
    if (j && Array.isArray(j.menus)) return j.menus;
    throw new Error("APIレスポンス不正");
  } catch (e) {
    console.warn("API読込失敗", e);
    const r2 = await fetch("data/menus.json");
    const j2 = await r2.json();
    return j2.menus || [];
  }
}

async function loadMenu() {
  const catId = getQuery("cat");
  const menus = await fetchMenus();
  const catData = await (await fetch("data/menus.json")).json();
  const cat = (catData.categories || []).find(x => x.id === catId);
  const heading = document.getElementById("heading");
  const list = document.getElementById("menuList");
  if (!cat) {
    heading.textContent = "不明なカテゴリ";
    list.innerHTML = '<li class="empty">カテゴリが見つかりません。</li>';
    return;
  }
  heading.textContent = `${cat.name} のメニュー`;
  const items = menus.filter(i => i.category === catId);
  if (!items.length) {
    list.innerHTML = '<li class="empty">メニューがありません。</li>';
    return;
  }
  list.innerHTML = "";
  items.forEach(item => {
    const li = document.createElement("li");
    li.className = "menu-card";
    li.innerHTML = `<div class="menu-card-title">${item.name}</div>
                    <div class="menu-card-description">${item.description || "説明なし"}</div>`;
    li.addEventListener("click", () => {
      location.href = `recipe.html?menu=${encodeURIComponent(item.id)}&cat=${encodeURIComponent(catId)}`;
    });
    list.appendChild(li);
  });
}

document.getElementById("backBtn").addEventListener("click",()=>{ location.href="index.html"; });
loadMenu().catch(err => {
  console.error(err);
  document.getElementById("menuList").innerHTML = '<li class="empty">データの読み込みに失敗しました。</li>';
});
</script>
</body>
</html>
