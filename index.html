<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>料理メニューカテゴリ</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>料理メニューカテゴリ</h1>
  <p>カテゴリを選択してメニューを見る</p>
  <a class="add-button"
     href="https://github.com/<OWNER>/<REPO>/issues/new?template=menu_add.md"
     target="_blank" rel="noopener">
    ＋ メニュー追加
  </a>
</header>
<main>
  <section>
    <div id="categoryGrid" class="grid"></div>
  </section>
</main>
<footer class="footer">
  <small>© 2026 料理メニューサイト</small>
</footer>
<script>
async function loadCategories() {
  const data = await fetch("data/menus.json").then(r => r.json());
  const grid = document.getElementById("categoryGrid");
  grid.innerHTML = "";
  (data.categories || []).forEach(c => {
    const btn = document.createElement("button");
    btn.className = "card";
    btn.type = "button";
    btn.textContent = c.name;
    btn.addEventListener("click", () => {
      location.href = `category.html?cat=${encodeURIComponent(c.id)}`;
    });
    grid.appendChild(btn);
  });
}
loadCategories().catch(err => console.error(err));
</script>
</body>
</html>
