<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>料理メニュー - カテゴリ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>料理メニューカテゴリ</h1>
  <p>カテゴリを選択してメニューを見る</p>
</header>
<main>
  <section>
    <div id="categoryGrid" class="grid"></div>
  </section>
</main>
<footer class="footer">
  <small>© 2026 料理メニューサイト</small>
</footer>
<script>
  async function loadData() {
    const res = await fetch("data/menus.json");
    const json = await res.json();
    const grid = document.getElementById("categoryGrid");
    json.categories.forEach(category => {
      const btn = document.createElement("button");
      btn.className = "card";
      btn.type = "button";
      btn.textContent = category.name;
      btn.addEventListener("click", () => {
        const u = new URL("category.html", location.href);
        u.searchParams.set("cat", category.id);
        location.href = u.toString();
      });
      grid.appendChild(btn);
    });
  }
  loadData().catch(console.error);
</script>
</body>
</html>
