<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>料理メニューカテゴリ</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>料理メニューカテゴリ</h1>
  <a class="add-button" href="add.html">＋ メニュー追加</a>
</header>
<main>
  <div id="categoryGrid" class="grid"></div>
</main>
<footer class="footer"><small>© 2026 料理メニューサイト</small></footer>
<script>
async function loadCategories() {
  const data = await fetch("data/menus.json").then(r => r.json());
  const list = document.getElementById("categoryGrid");
  list.innerHTML = "";
  (data.categories || []).forEach(c => {
    const btn = document.createElement("button");
    btn.className = "card";
    btn.type = "button";
    btn.textContent = c.name;
    btn.addEventListener("click", () => {
      location.href = `category.html?cat=${encodeURIComponent(c.id)}`;
    });
    list.appendChild(btn);
  });
}
loadCategories().catch(console.error);
</script>
</body>
</html>
