<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>料理メニュー - レシピ</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>
<header>
  <h1 id="heading">レシピ</h1>
</header>
<main>
  <button id="backBtn" class="back-btn" type="button">戻る</button>
  <article id="recipeContent" class="recipe-content"></article>
</main>
<footer class="footer">
  <small>© 2026 料理メニューサイト</small>
</footer>

<script>
function getQuery(name) { return new URLSearchParams(location.search).get(name); }

async function fetchMenus() {
  const json = await fetch("data/menus.json").then(r => r.json());
  const custom = JSON.parse(localStorage.getItem("customMenus") || "[]");
  return [...(json.menus || []), ...custom];
}

async function loadRecipe() {
  const menuId = getQuery("menu");
  const menus = await fetchMenus();
  const menu = menus.find(m => m.id === menuId);
  const heading = document.getElementById("heading");
  const content = document.getElementById("recipeContent");

  if (!menu) {
    heading.textContent = "レシピが見つかりません";
    content.innerHTML = '<p class="empty">メニューが見つかりません。</p>';
    return;
  }

  heading.textContent = menu.name;
  const ingredients = (menu.ingredients || []).map(i => {
    if (typeof i === "object") return `<div class="ingredient-row"><div class="ingredient-name">${i.item}</div><div class="ingredient-amount">${i.amount||""}</div></div>`;
    const [item, amount] = i.split(/\s+(.+)/);
    return `<div class="ingredient-row"><div class="ingredient-name">${item}</div><div class="ingredient-amount">${amount||""}</div></div>`;
  }).join("");
  const recipe = (menu.recipe || []).map(step => `<li>${step}</li>`).join("");

  content.innerHTML = `
    <section class="box"><h2>説明</h2><p class="menu-card-description">${menu.description || "説明なし"}</p></section>
    <section class="box"><h2>材料</h2><p><strong>分量：</strong>${menu.serving || "不明"}</p><div class="ingredient-list">${ingredients || "<p>材料が登録されていません</p>"}</div></section>
    <section class="box"><h2>作り方</h2><ol>${recipe || "<li>手順が登録されていません</li>"}</ol></section>`;
}

document.getElementById("backBtn").addEventListener("click", ()=> {
  const cat = getQuery("cat");
  location.href = cat ? `category.html?cat=${encodeURIComponent(cat)}` : "index.html";
});
loadRecipe().catch(err => {
  console.error(err);
  document.getElementById("recipeContent").innerHTML = '<p class="empty">読み込み失敗</p>';
});
</script>
</body>
</html>
